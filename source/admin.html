<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>博客管理后台</title>
<link rel="stylesheet" href="https://fastly.jsdelivr.net/npm/star-markdown-css@0.4.1/dist/yun/yun-markdown.min.css">
<style>
:root {
  --primary: #0078e7;
  --bg: #f5f5f5;
  --card-bg: #fff;
  --text: #333;
  --text-secondary: #666;
  --border: #e0e0e0;
  --danger: #e74c3c;
  --success: #27ae60;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
}
.header {
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  padding: 1rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; }
.header a { color: var(--primary); text-decoration: none; font-size: 0.9rem; }
.container { max-width: 1000px; margin: 0 auto; padding: 2rem 1rem; }

.card {
  background: var(--card-bg);
  border-radius: 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  padding: 1.5rem;
  margin-bottom: 1rem;
}
.card h2 { font-size: 1.1rem; margin-bottom: 1rem; font-weight: 600; }

label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.3rem; }
input, textarea, select {
  width: 100%;
  padding: 0.6rem 0.8rem;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 0.9rem;
  font-family: inherit;
  margin-bottom: 0.8rem;
  outline: none;
  transition: border-color 0.2s;
}
input:focus, textarea:focus { border-color: var(--primary); }
textarea { min-height: 350px; resize: vertical; font-family: "Monaco", "Menlo", monospace; font-size: 0.85rem; }

.form-row { display: flex; gap: 0.8rem; align-items: center; }
.form-row > div { flex: 1; }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.6rem 1.2rem;
  border: none;
  border-radius: 6px;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { opacity: 0.9; }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { opacity: 0.9; }
.btn-sm { padding: 0.35rem 0.7rem; font-size: 0.8rem; }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { opacity: 0.9; }

.tabs { display: flex; gap: 0; margin-bottom: 1rem; border-bottom: 2px solid var(--border); }
.tab {
  padding: 0.6rem 1.2rem;
  cursor: pointer;
  font-size: 0.9rem;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  color: var(--text-secondary);
  transition: all 0.2s;
}
.tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
.tab:hover { color: var(--text); }

.preview-box {
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 1.5rem;
  min-height: 350px;
  overflow-y: auto;
}

.alert {
  padding: 0.8rem 1rem;
  border-radius: 6px;
  margin-bottom: 0.8rem;
  font-size: 0.85rem;
  animation: fadeIn 0.3s;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
.alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
.alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
.alert-info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }

.empty-state { text-align: center; padding: 3rem; color: var(--text-secondary); font-size: 0.9rem; }

.file-upload-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.5rem 1rem;
  background: #f8f8f8;
  border: 1px dashed var(--border);
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.85rem;
  color: var(--text-secondary);
  transition: all 0.2s;
}
.file-upload-btn:hover { border-color: var(--primary); color: var(--primary); }
input[type="file"] { display: none; }

.post-list { list-style: none; }
.post-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.8rem 0;
  border-bottom: 1px solid #f0f0f0;
  gap: 1rem;
}
.post-item:last-child { border-bottom: none; }
.post-item .post-info { flex: 1; min-width: 0; }
.post-item .post-title { font-weight: 500; margin-bottom: 0.2rem; }
.post-item .post-meta { font-size: 0.8rem; color: var(--text-secondary); display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
.post-tag {
  display: inline-block;
  padding: 0.1rem 0.45rem;
  font-size: 0.72rem;
  color: #fff;
  background: var(--primary);
  border-radius: 3px;
}
.post-item .post-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }

.tags-input-wrapper {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  padding: 0.4rem 0.6rem;
  border: 1px solid var(--border);
  border-radius: 6px;
  min-height: 2.4rem;
  margin-bottom: 0.8rem;
  cursor: text;
  transition: border-color 0.2s;
}
.tags-input-wrapper:focus-within { border-color: var(--primary); }
.tag-chip {
  display: inline-flex;
  align-items: center;
  gap: 0.25rem;
  padding: 0.15rem 0.5rem;
  font-size: 0.8rem;
  background: #e8f0fe;
  color: var(--primary);
  border-radius: 3px;
}
.tag-chip .tag-remove {
  cursor: pointer;
  font-size: 0.9rem;
  line-height: 1;
  opacity: 0.6;
}
.tag-chip .tag-remove:hover { opacity: 1; }
.tags-input {
  border: none !important;
  outline: none !important;
  flex: 1;
  min-width: 80px;
  padding: 0.2rem;
  font-size: 0.85rem;
  margin-bottom: 0 !important;
}

@media (max-width: 768px) {
  .header { padding: 0.8rem 1rem; }
  .container { padding: 1rem; }
  .form-row { flex-direction: column; gap: 0; }
  .post-item { flex-direction: column; align-items: flex-start; }
  .post-item .post-actions { align-self: flex-end; }
}
</style>
<select id="mode-select" onchange="setMode(this.value)" style="padding:0.2rem 0.4rem;font-size:0.8rem;width:auto;margin:0;border-radius:4px;border:1px solid #e0e0e0">
  <option value="local">🔧 本地</option>
  <option value="github">☁️ GitHub</option>
</select>
</head>
<body>

<div class="header">
  <h1>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
    </svg>
    博客管理后台
  </h1>
  <div style="display:flex;gap:1rem;align-items:center">
    <a href="/admin.html" title="刷新">⟳ 刷新</a>
    <a href="/" target="_blank">← 返回博客</a>
  </div>
</div>

<div class="container">
  <div id="alert-area"></div>

  <!-- Editor Section -->
  <div id="editor-card" class="card">
    <div class="tabs">
      <div class="tab active" onclick="switchTab(this, 'editor')">✏️ 编辑</div>
      <div class="tab" onclick="switchTab(this, 'preview')">👁️ 预览</div>
      <div class="tab" onclick="switchTab(this, 'posts')">📄 管理文章</div>
    </div>

    <div id="tab-editor">
      <div class="form-row" style="margin-bottom:0.5rem">
        <div style="flex:3">
          <label>文章标题</label>
          <input type="text" id="title-input" placeholder="输入文章标题">
        </div>
        <div style="flex:2">
          <label>文章标识（slug）</label>
          <input type="text" id="slug-input" placeholder="自动生成，可自定义">
        </div>
      </div>

      <label>文章标签</label>
      <div class="tags-input-wrapper" id="tags-wrapper" onclick="document.getElementById('tags-input').focus()">
        <div id="tags-container" style="display:flex;flex-wrap:wrap;gap:0.4rem;align-items:center"></div>
        <input type="text" class="tags-input" id="tags-input" placeholder="输入标签后按 Enter 添加">
      </div>

      <div style="display:flex;gap:0.8rem;align-items:center;margin-bottom:0.8rem">
        <label class="file-upload-btn">
          📂 导入 .md 文件
          <input type="file" accept=".md" onchange="handleFileUpload(event)">
        </label>
        <button class="btn btn-outline btn-sm" onclick="switchTab(document.querySelector('.tab'), 'preview')">👁️ 预览</button>
        <span id="editing-hint" style="font-size:0.8rem;color:var(--text-secondary);display:none">正在编辑: <span id="editing-slug"></span></span>
      </div>

      <label>正文内容（Markdown）</label>
      <textarea id="content-input" placeholder="在此输入 Markdown 内容...&#10;&#10;支持：**粗体** *斜体* `代码` [链接](url) 等语法"></textarea>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:0.8rem">
        <div style="display:flex;gap:0.5rem">
          <button class="btn btn-outline btn-sm" onclick="clearEditor()">🗑️ 清空</button>
          <button class="btn btn-outline btn-sm" id="cancel-edit-btn" style="display:none" onclick="cancelEdit()">取消编辑</button>
        </div>
        <button class="btn btn-primary" id="publish-btn" onclick="publishPost()">📤 发布文章</button>
      </div>
    </div>

    <div id="tab-preview" style="display:none">
      <h3 id="preview-title" style="margin-bottom:0.8rem;font-size:1.3rem;color:var(--text)"></h3>
      <div id="preview-tags" style="margin-bottom:0.8rem"></div>
      <div id="preview-content" class="preview-box markdown-body"></div>
    </div>

    <div id="tab-posts" style="display:none">
      <h2 style="margin-bottom:1rem">管理文章</h2>
      <div id="posts-list"><div class="empty-state">加载中...</div></div>
    </div>
  </div>
</div>

<script>

// ======== Mode Toggle: Local API or Direct GitHub API ========
const MODE_KEY = "blog_admin_mode";
function getMode() { return localStorage.getItem(MODE_KEY) || "local"; }
function setMode(mode) { localStorage.setItem(MODE_KEY, mode); location.reload(); }

const CONFIG_KEY = "blog_github_config";
function getGithubConfig() {
  try { return JSON.parse(localStorage.getItem(CONFIG_KEY)) || null; }
  catch(e) { return null; }
}
function saveGithubConfig(config) { localStorage.setItem(CONFIG_KEY, JSON.stringify(config)); }

async function githubFetch(url, options) {
  const config = getGithubConfig();
  if (!config) throw new Error("请先配置 GitHub 连接");
  const res = await fetch("https://api.github.com" + url, {
    ...options,
    headers: {
      "Authorization": "Bearer " + config.token,
      "Content-Type": "application/json",
      "User-Agent": "blog-admin",
      ...((options && options.headers) || {})
    }
  });
  if (!res.ok) {
    const err = await res.json().catch(function(){ return { message: res.statusText }; });
    throw new Error(err.message || "请求失败");
  }
  return res.json();
}

// ======== Tag Management ========
let currentTags = new Set();

function renderTags() {
  const container = document.querySelector('#tags-container');
  container.innerHTML = '';
  currentTags.forEach(tag => {
    const chip = document.createElement('span');
    chip.className = 'tag-chip';
    chip.innerHTML = tag + '<span class="tag-remove" onclick="removeTag(\'' + tag.replace(/'/g, "\\'") + '\')">×</span>';
    container.appendChild(chip);
  });
}

function addTag(tag) {
  tag = tag.trim();
  if (!tag || currentTags.has(tag)) return;
  currentTags.add(tag);
  renderTags();
  document.getElementById('tags-input').value = '';
}

function removeTag(tag) {
  currentTags.delete(tag);
  renderTags();
}

document.getElementById('tags-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    const val = this.value.trim();
    if (val) {
      // Support comma-separated tags
      val.split(/[,，]/).forEach(t => addTag(t));
    }
  }
  if (e.key === 'Backspace' && !this.value && currentTags.size > 0) {
    const arr = Array.from(currentTags);
    currentTags.delete(arr[arr.length - 1]);
    renderTags();
  }
});

document.getElementById('tags-input').addEventListener('blur', function() {
  const val = this.value.trim();
  if (val) {
    val.split(/[,，]/).forEach(t => addTag(t));
  }
});

// ======== Toast Alerts ========
function showAlert(msg, type) {
  const area = document.getElementById('alert-area');
  const div = document.createElement('div');
  div.className = 'alert alert-' + type;
  div.textContent = msg;
  area.appendChild(div);
  setTimeout(() => div.remove(), 4000);
}

// ======== Tab Switching ========
function switchTab(el, tabName) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('[id^="tab-"]').forEach(t => t.style.display = 'none');
  document.getElementById('tab-' + tabName).style.display = 'block';
  if (tabName === 'preview') updatePreview();
  if (tabName === 'posts') loadPosts();
}

// ======== Preview ========
function updatePreview() {
  const title = document.getElementById('title-input').value || '（无标题）';
  const content = document.getElementById('content-input').value || '';
  document.getElementById('preview-title').textContent = title;

  const tagsContainer = document.getElementById('preview-tags');
  tagsContainer.innerHTML = '';
  currentTags.forEach(tag => {
    const span = document.createElement('span');
    span.className = 'post-tag';
    span.textContent = '#' + tag;
    span.style.marginRight = '0.4rem';
    tagsContainer.appendChild(span);
  });

  document.getElementById('preview-content').innerHTML = markedParse(content);
}

function markedParse(md) {
  try {
    if (typeof marked !== 'undefined' && marked.parse) return marked.parse(md);
  } catch(e) {}
  return '<pre style="white-space:pre-wrap">' + md.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</pre>';
}

// ======== File Upload ========
function handleFileUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const text = ev.target.result;

    // Parse front-matter
    const fmMatch = text.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
    if (fmMatch) {
      const fm = fmMatch[1];
      const body = fmMatch[2];

      // Extract title
      const titleMatch = fm.match(/title:\s*"([^"]+)"|title:\s*([^\n]+)/);
      if (titleMatch) {
        document.getElementById('title-input').value = (titleMatch[1] || titleMatch[2]).trim();
      }

      // Extract tags
      const tagsMatch = fm.match(/tags:\s*\[([^\]]*)\]/);
      if (tagsMatch) {
        currentTags = new Set(tagsMatch[1].split(',').map(t => t.trim().replace(/^["']|["']$/g, '')).filter(Boolean));
        renderTags();
      }

      document.getElementById('content-input').value = body.trim();
    } else {
      // No front-matter, try to extract title from first heading
      const headingMatch = text.match(/^#\s+(.+)$/m);
      if (headingMatch) {
        document.getElementById('title-input').value = headingMatch[1];
      }
      document.getElementById('content-input').value = text;
    }

    showAlert('📄 ' + file.name + ' 已导入', 'info');
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ======== Clear Editor ========
function clearEditor() {
  document.getElementById('title-input').value = '';
  document.getElementById('slug-input').value = '';
  document.getElementById('content-input').value = '';
  currentTags = new Set();
  renderTags();
  document.getElementById('editing-hint').style.display = 'none';
  document.getElementById('publish-btn').textContent = '📤 发布文章';
  document.getElementById('cancel-edit-btn').style.display = 'none';
}

// ======== Cancel Edit ========
function cancelEdit() {
  clearEditor();
}

// ======== Publish / Save ========
async function publishPost() {
  const title = document.getElementById('title-input').value.trim();
  const content = document.getElementById('content-input').value.trim();
  let slug = document.getElementById('slug-input').value.trim();

  if (!title) { showAlert('请输入文章标题', 'error'); return; }
  if (!content) { showAlert('请输入文章内容', 'error'); return; }

  // Generate slug if not provided
  if (!slug) {
    slug = title.toLowerCase()
      .replace(/[^\w\s\u4e00-\u9fff-]/g, '')
      .replace(/\s+/g, '-')
      .replace(/-+/g, '-')
      .replace(/^-|-$/g, '')
      .trim() || 'post-' + Date.now();
  }

  const btn = document.getElementById('publish-btn');
  btn.disabled = true;
  const originalText = btn.textContent;
  btn.textContent = '⏳ 发布中...';

  try {
    const res = await fetch('/api/posts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        title,
        slug,
        tags: Array.from(currentTags),
        content
      })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '发布失败');

    showAlert('✅ ' + data.message + ': ' + title, 'success');
    document.getElementById('slug-input').value = data.slug;
    document.getElementById('editing-hint').style.display = 'none';
    document.getElementById('publish-btn').textContent = '📤 发布文章';
    document.getElementById('cancel-edit-btn').style.display = 'none';
    loadPosts();
  } catch (err) {
    showAlert('❌ 发布失败: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = originalText;
  }
}

// ======== Edit Post (load into editor) ========
async function editPost(slug) {
  try {
    const res = await fetch('/api/posts/' + slug);
    if (!res.ok) throw new Error('无法加载文章');
    const post = await res.json();

    document.getElementById('title-input').value = post.title || '';
    document.getElementById('slug-input').value = post.slug || slug;
    document.getElementById('content-input').value = post.body || '';
    currentTags = new Set(post.tags || []);
    renderTags();

    document.getElementById('editing-hint').style.display = 'inline';
    document.getElementById('editing-slug').textContent = slug;
    document.getElementById('publish-btn').textContent = '💾 保存更新';
    document.getElementById('cancel-edit-btn').style.display = 'inline';

    // Switch to editor tab
    switchTab(document.querySelectorAll('.tab')[0], 'editor');

    showAlert('✏️ 已加载文章: ' + post.title, 'info');
  } catch (err) {
    showAlert('❌ 加载失败: ' + err.message, 'error');
  }
}

// ======== Delete Post ========
async function deletePost(slug) {
  if (!confirm('确定要删除这篇文章吗？此操作不可恢复。')) return;

  try {
    const res = await fetch('/api/posts/' + slug, { method: 'DELETE' });
    if (!res.ok) throw new Error('删除失败');
    const data = await res.json();
    showAlert('🗑️ 已删除: ' + data.slug, 'success');
    loadPosts();
  } catch (err) {
    showAlert('❌ 删除失败: ' + err.message, 'error');
  }
}

// ======== Load Posts List ========
async function loadPosts() {
  const list = document.getElementById('posts-list');
  list.innerHTML = '<div class="empty-state">加载中...</div>';

  try {
    const res = await fetch('/api/posts');
    if (!res.ok) throw new Error('无法加载文章列表');
    const posts = await res.json();

    if (posts.length === 0) {
      list.innerHTML = '<div class="empty-state">📭 还没有发布过文章，去编辑页面写一篇吧</div>';
      return;
    }

    list.innerHTML = '<ul class="post-list">' + posts.map(p => {
      const tagsHtml = (p.tags || []).map(t => '<span class="post-tag">#' + t + '</span>').join(' ');
      return '<li class="post-item">' +
        '<div class="post-info">' +
          '<div class="post-title">' + (p.title || p.slug) + '</div>' +
          '<div class="post-meta">' +
            '<span>' + p.date + '</span>' +
            (tagsHtml ? '<span>' + tagsHtml + '</span>' : '') +
            '<span style="color:#999;font-size:0.75rem">' + p.slug + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="post-actions">' +
          '<button class="btn btn-outline btn-sm" onclick="editPost(\'' + p.slug + '\')">✏️</button>' +
          '<button class="btn btn-danger btn-sm" onclick="deletePost(\'' + p.slug + '\')">🗑️</button>' +
        '</div>' +
      '</li>';
    }).join('') + '</ul>';
  } catch (err) {
    list.innerHTML = '<div class="alert alert-error">加载失败: ' + err.message + '</div>';
  }
}

// ======== Init ========
document.addEventListener('DOMContentLoaded', function() { 
  const mode = getMode(); 
  const sel = document.getElementById('mode-select'); 
  if (sel) sel.value = mode; 
  if (mode === 'github') { 
    const config = getGithubConfig(); 
    if (config) { 
      loadPosts(); 
    } else { 
      document.getElementById('config-modal').style.display = 'flex'; 
    } 
  } else { 
    loadPosts(); 
  } 
});

// Load marked library as fallback
var script = document.createElement('script');
script.src = 'https://unpkg.com/marked/marked.min.js';
script.onload = function() {
  if (document.getElementById('tab-preview').style.display !== 'none') updatePreview();
};
document.head.appendChild(script);

// Mode-aware API wrappers

// Override fetch-based functions to use mode-aware APIs

</script>

</div>

</body>
</html>
